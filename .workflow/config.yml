# yaml-language-server: $schema=./workflow.schema.json
# workflow-runner 設定ファイル
# このファイルをプロジェクトルートの .workflow/config.yml に置く

# 他ファイルへの分割（imports: で複数ファイルに切り出せる）
# imports:
#   - commands/default.yml
#   - workflows/extra.yml

# プロジェクト固有の変数定義（Makefile の target 名を登録する）
vars:
  test: make test
  lint: make lint
  build: make build

# ワークフローテンプレート
workflows:
  bug-fix:
    name: バグ修正フロー
    description: バグを再現・特定し、修正・テストまで完走するフロー
    tasks:
      - id: reproduce
        name: 再現確認
        description: バグを手元で再現し、再現手順（環境・操作・期待値・実際の挙動）を記録する

      - id: identify
        name: 原因特定
        description: 原因となるファイル・関数・行を特定して記録する

      - id: implement
        name: 修正実装
        description: 最小限の変更でバグを修正する。影響範囲を意識すること
        outputs:
          - "src/**"
          - "tests/**"
        requires: [reproduce, identify]

      - id: complete
        name: 完了判定
        description: すべてのタスクが完了したことを確認し、作業を完了とマークする
        requires: [implement]

  feature:
    name: 機能開発フロー
    description: 新機能を設計・実装・テストするフロー
    tasks:
      - id: design
        name: 設計確認
        description: 実装方針・影響範囲・インターフェースを整理して記録する
        outputs:
          - "docs/**"
          - "/.*\\.md$/"

      - id: implement
        name: 実装
        description: 設計に従って実装する
        outputs:
          - "src/**"
          - "tests/**"
        deny:
          files:
            - "docs/specs/**"
        requires: [design]

      - id: complete
        name: 完了判定
        description: 実装・テストが完了したことを確認する
        requires: [implement]

  release:
    name: リリースフロー
    description: 設計・実装・品質チェック（並列）まで完走するフロー
    tasks:
      - id: design
        name: 設計確認
        description: 実装方針・影響範囲・インターフェースを整理して記録する
        outputs:
          - "docs/**"

      - id: implement
        name: 実装
        description: 設計に従って実装する
        requires: [design]
        outputs:
          - "src/**"
          - "tests/**"

      - id: quality-check
        name: 品質チェック（並列）
        requires: [implement]
        agents:
          - id: run-test
            name: テスト実行
            actions:
              - type: agent
                prompt: "{{vars.test}} を実行してテストがすべてパスすることを確認してください"
          - id: run-lint
            name: Lint
            actions:
              - type: agent
                prompt: "{{vars.lint}} を実行して Lint が通ることを確認してください"

      - id: complete
        name: 完了判定
        description: 設計・実装・品質チェックが完了したことを確認する
        requires: [quality-check]
